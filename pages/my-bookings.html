<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | Fork & Flames</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar scrolled">
        <div class="container nav-container">
            <a href="../index.html" class="logo">
                <i class="fa-solid fa-fire logo-icon"></i>
                Fork & Flames
            </a>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="booking.html">Book Table</a>
            </div>
            <div class="nav-actions">
                <span class="badge" style="background: rgba(255, 107, 53, 0.2); color: var(--primary);">
                    <i class="fa-solid fa-user"></i> My Profile
                </span>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top: 120px; min-height: 80vh;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2>My Table Bookings</h2>
            <a href="booking.html" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Booking</a>
        </div>

        <div class="data-table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Guests</th>
                        <th>Special Requests</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="my-bookings-tbody">
                    <tr><td colspan="4" style="text-align: center; padding: 40px;">Loading your bookings...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/my-bookings.js"></script>
</body>
</html>
