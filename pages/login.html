<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Fork & Flames</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">

    <div class="auth-container animate-up">
        <a href="../index.html" class="logo auth-logo">
            <i class="fa-solid fa-fire logo-icon"></i>
            Fork & Flames
        </a>
        
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Sign In</button>
            <button class="auth-tab" data-tab="signup">Create Account</button>
        </div>
        
        <!-- Login Form -->
        <form id="login-form" class="auth-form active-form">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-with-icon">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="login-email" class="form-control" placeholder="you@example.com" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            
            <div class="form-options">
                <label class="checkbox-container">
                    <input type="checkbox" checked>
                    <span class="checkmark"></span>
                    Remember me
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            
            <!-- Demo Credentials Note -->
            <div class="demo-creds">
                <p><strong>Demo Roles:</strong> customer@test.com / staff@test.com / owner@test.com</p>
            </div>
        </form>
        
        <!-- Signup Form -->
        <form id="signup-form" class="auth-form">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <div class="input-with-icon">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" id="signup-name" class="form-control" placeholder="John Doe" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-with-icon">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="signup-email" class="form-control" placeholder="you@example.com" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="signup-password" class="form-control" placeholder="Create a password" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">I want to:</label>
                <select id="signup-role" class="form-control select-style">
                    <option value="customer">Order Food (Customer)</option>
                    <option value="staff">Manage Orders (Staff)</option>
                    <option value="owner">Manage Restaurant (Owner)</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
