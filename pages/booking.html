<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Table | Fork & Flames</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css"> <!-- Reusing form styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="../index.html" class="logo">
                <i class="fa-solid fa-fire logo-icon" style="color: #FF6B35;"></i>
                Fork & Flames
            </a>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="menu.html">Menu</a>
            </div>
            <div class="nav-actions">
                <a href="login.html" class="btn btn-primary" id="auth-btn">
                    Sign In <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </nav>

    <div class="auth-page" style="padding-top: 80px;">
        <div class="auth-container">
            <!-- Reusing auth card for booking form -->
            <div class="auth-card glass-panel animate-up">
                <div class="auth-header" style="text-align: center; margin-bottom: 30px;">
                    <div class="auth-icon" style="background: rgba(255,107,53,0.1); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: var(--primary); font-size: 1.5rem;">
                        <i class="fa-solid fa-chair"></i>
                    </div>
                    <h2>Book a Table</h2>
                    <p>Reserve your spot at Fork & Flames for an unforgettable experience.</p>
                </div>

                <form id="booking-form" class="auth-form active-form">
                    <div class="form-group">
                        <label class="form-label" for="booking-date">Date</label>
                        <div class="input-with-icon">
                            <i class="fa-regular fa-calendar input-icon"></i>
                            <input type="date" id="booking-date" class="form-control" required style="padding-left: 45px;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="booking-time">Time</label>
                        <div class="input-with-icon">
                            <i class="fa-regular fa-clock input-icon"></i>
                            <input type="time" id="booking-time" class="form-control" required style="padding-left: 45px;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="booking-guests">Number of Guests</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-users input-icon"></i>
                            <input type="number" id="booking-guests" class="form-control" min="1" max="20" placeholder="e.g. 2" required style="padding-left: 45px;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="booking-notes">Special Requests (Optional)</label>
                        <textarea id="booking-notes" class="form-control" placeholder="Anniversary, Window seat, Allergies..." rows="3" style="resize: none;"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Confirm Reservation</button>
                    <div id="booking-error" class="form-error" style="display: none; color: var(--danger); margin-top: 15px; text-align: center;"></div>
                    <div id="booking-success" style="display: none; color: var(--success); margin-top: 15px; text-align: center; font-weight: bold;"></div>
                    
                    <div style="text-align: center; margin-top: 20px;">
                        <a href="my-bookings.html" style="color: var(--primary); text-decoration: none;"><i class="fa-solid fa-list"></i> View My Bookings</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/booking.js"></script>
</body>
</html>
