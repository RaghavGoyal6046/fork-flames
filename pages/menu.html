<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Menu | Fork & Flames</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/restaurants.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <!-- Exact same navbar as others -->
        <div class="container nav-container">
            <a href="../index.html" class="logo">
                <i class="fa-solid fa-fire logo-icon" style="color: #FF6B35;"></i>
                Fork & Flames
            </a>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="menu.html" class="active">Menu</a>
            </div>
            <div class="nav-actions">
                <a href="cart.html" class="cart-btn">
                    <i class="fa-solid fa-basket-shopping"></i>
                    <span class="cart-badge" id="cart-count">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Restaurant Header info populated by JS -->
    <header class="menu-header" id="menu-header-container">
        <!-- Mock default if JS fails -->
        <div class="menu-bg"><img src="https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=2000&q=80" alt="Cover"></div>
        <div class="menu-overlay"></div>
        <div class="container">
            <h1 class="restaurant-title-lg">Burger Lounge</h1>
            <div class="menu-meta">
                <span class="rating"><i class="fa-solid fa-star"></i> 4.8</span>
                <span>American • $$</span>
                <span><i class="fa-regular fa-clock"></i> 20-30 min</span>
            </div>
        </div>
    </header>

    <div class="container layout-grid" style="margin-top: 50px;">
        <!-- Categories Sidebar -->
        <aside class="sidebar-filters glass-panel" style="padding: 0;">
            <div class="menu-categories" style="padding: 24px;">
                <h3>Menu Categories</h3>
                <div class="cat-list" id="category-nav">
                    <a href="#cat-popular" class="cat-link active">Popular <i class="fa-solid fa-fire text-gradient" style="float:right"></i></a>
                    <a href="#cat-burgers" class="cat-link">Gourmet Burgers</a>
                    <a href="#cat-sides" class="cat-link">Sides & Shareables</a>
                    <a href="#cat-drinks" class="cat-link">Beverages</a>
                </div>
            </div>
        </aside>

        <!-- Menu Items -->
        <main id="menu-sections-container">
            <!-- Dynamically populated via JS -->
            <!-- Placeholder for visual if JS takes time -->
            <div class="menu-section" id="cat-popular">
                <h2 class="menu-section-title">Loading Menu...</h2>
            </div>
        </main>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/menu.js"></script>
</body>
</html>
