<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Fork & Flames</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.6); 
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: var(--glass-bg);
            margin: 10% auto; 
            padding: 30px; 
            border: 1px solid var(--glass-border); 
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
        }
        .close-modal {
            color: var(--text-muted);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-modal:hover { color: white; }
        .rating-stars { display: flex; gap: 10px; font-size: 2rem; color: #555; cursor: pointer; margin-bottom: 20px; justify-content: center; }
        .rating-stars i:hover, .rating-stars i.active { color: #F59E0B; }
    </style>
</head>
<body>

    <nav class="navbar scrolled">
        <div class="container nav-container">
            <a href="../index.html" class="logo">
                <i class="fa-solid fa-fire logo-icon"></i>
                Fork & Flames
            </a>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="booking.html">Book Table</a>
                <a href="orders.html" style="color:var(--primary)">Live Tracking</a>
            </div>
            <div class="nav-actions">
                <a href="my-bookings.html" class="btn btn-outline" style="padding:8px 16px; border-color:var(--glass-border); color:var(--text-main)"><i class="fa-solid fa-chair"></i></a>
                <span class="badge" style="background: rgba(255, 107, 53, 0.2); color: var(--primary);">
                    <i class="fa-solid fa-user"></i> Profile
                </span>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top: 120px; min-height: 80vh;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2>My Orders History</h2>
            <a href="menu.html" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Order</a>
        </div>

        <div class="data-table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Type</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="my-orders-tbody">
                    <tr><td colspan="6" style="text-align: center; padding: 40px;">Loading your orders...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Review Modal -->
    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeReviewModal()">&times;</span>
            <h3 style="margin-top: 0; margin-bottom: 20px;"><i class="fa-solid fa-star" style="color:var(--primary)"></i> Write a Review</h3>
            
            <div class="rating-stars" id="star-rating">
                <i class="fa-solid fa-star" data-val="1"></i>
                <i class="fa-solid fa-star" data-val="2"></i>
                <i class="fa-solid fa-star" data-val="3"></i>
                <i class="fa-solid fa-star" data-val="4"></i>
                <i class="fa-solid fa-star" data-val="5"></i>
            </div>
            
            <textarea id="review-comment" class="form-control" rows="4" placeholder="Tell us about your experience! Was the food delicious? How was the service?" style="resize:none; margin-bottom: 20px;"></textarea>
            
            <button class="btn btn-primary btn-block" onclick="submitReview()">Submit Review</button>
            <div id="review-msg" style="margin-top: 15px; text-align: center; font-weight: bold;"></div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/my-orders.js"></script>
</body>
</html>
